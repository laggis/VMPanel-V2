<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Control Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/style.css?v=10">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
<div id="toast-area" class="toast-area"></div>

{% block content %}{% endblock %}

<script>
const token = localStorage.getItem('token');
if (!token && !['/', '/login'].includes(window.location.pathname)) {
  window.location.href = '/login';
}

const api = axios.create({ baseURL: '/', headers: { 'Authorization': 'Bearer ' + token } });
api.interceptors.response.use(r => r, err => {
  if (err.response?.status === 401) { localStorage.removeItem('token'); window.location.href = '/login'; }
  return Promise.reject(err);
});

function logout() { localStorage.removeItem('token'); window.location.href = '/login'; }

function showToast(msg, type = 'info', duration = 4500) {
  const area = document.getElementById('toast-area');
  const icons = { success:'fa-check-circle', danger:'fa-times-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<i class="fas ${icons[type]||icons.info} toast-ico"></i><span class="toast-msg">${msg}</span><button class="toast-x" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>`;
  area.appendChild(t);
  if (duration > 0) setTimeout(() => t?.remove(), duration);
  return t;
}

function openModal(id) { const e = document.getElementById(id); if(e){e.classList.add('open');document.body.style.overflow='hidden';} }
function closeModal(id) { const e = document.getElementById(id); if(e){e.classList.remove('open');document.body.style.overflow='';} }
document.addEventListener('click', e => { if(e.target.classList.contains('modal-ov')) closeModal(e.target.id); });
document.addEventListener('keydown', e => { if(e.key==='Escape') document.querySelectorAll('.modal-ov.open').forEach(m=>closeModal(m.id)); });

function confirm2(title, msg, dangerous=false) {
  return new Promise(resolve => {
    const id = 'conf_' + Date.now();
    const el = document.createElement('div');
    el.className = 'modal-ov open'; el.id = id;
    el.innerHTML = `<div class="modal-box" style="max-width:340px;text-align:center;padding:28px;">
      <div style="font-size:28px;margin-bottom:12px;">${dangerous?'⚠️':'❓'}</div>
      <div style="font-size:14.5px;font-weight:700;margin-bottom:8px;">${title}</div>
      <div style="font-size:12.5px;color:var(--text2);margin-bottom:20px;line-height:1.6;">${msg}</div>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button class="btn btn-ghost" onclick="document.getElementById('${id}').remove();window['__r${id}'](false)">Cancel</button>
        <button class="btn ${dangerous?'btn-danger':'btn-primary'}" onclick="document.getElementById('${id}').remove();window['__r${id}'](true)">Confirm</button>
      </div></div>`;
    document.body.appendChild(el);
    window[`__r${id}`] = resolve;
  });
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
